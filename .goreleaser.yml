version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/skimd
    binary: skimd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: lunemis
      name: homebrew-tap
    homepage: "https://github.com/lunemis/skimd"
    description: "TUI markdown viewer for quick document review in terminal"
    license: "MIT"
    install: |
      bin.install "skimd"
    test: |
      system "#{bin}/skimd", "--help"
