name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Test (race)
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./cmd/skimd

      - name: Cross-compile (Linux arm64)
        run: GOARCH=arm64 go build ./cmd/skimd
